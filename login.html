<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#03050a">
  <title>ログイン | MRI業務マニュアル</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: #03050a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    /* 背景の星のような光点 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 25%, rgba(0,180,216,0.07) 0%, transparent 45%),
        radial-gradient(ellipse at 85% 75%, rgba(100,30,200,0.07) 0%, transparent 45%),
        radial-gradient(ellipse at 50% 50%, rgba(0,100,180,0.04) 0%, transparent 70%);
      pointer-events: none;
    }
    .login-card {
      background: rgba(6, 9, 16, 0.97);
      border: 1px solid rgba(0, 180, 216, 0.18);
      border-radius: 20px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow:
        0 24px 80px rgba(0,0,0,0.9),
        0 0 60px rgba(0,180,216,0.05),
        inset 0 1px 0 rgba(0,180,216,0.08);
      position: relative;
      z-index: 1;
      backdrop-filter: blur(20px);
    }
    .logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-icon {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(0,180,216,0.4);
      box-shadow: 0 0 24px rgba(0,180,216,0.25);
    }
    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .logo-icon-fallback {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0d1b2a, #0f2d44);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      border-radius: 50%;
    }
    .logo h1 {
      font-size: 18px;
      color: #e0f8fd;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: 0.02em;
    }
    .logo p {
      font-size: 13px;
      color: rgba(0,180,216,0.7);
      margin-top: 5px;
      letter-spacing: 0.04em;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(0,180,216,0.9);
      margin-bottom: 7px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(0,180,216,0.2);
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      background: rgba(255,255,255,0.06);
      color: #e0f8fd;
    }
    input[type="text"]::placeholder, input[type="password"]::placeholder {
      color: rgba(255,255,255,0.25);
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: rgba(0,180,216,0.6);
      box-shadow: 0 0 0 3px rgba(0,180,216,0.12);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #0099b8 0%, #00b4d8 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 16px rgba(0,180,216,0.3);
    }
    .btn-login:hover {
      background: linear-gradient(135deg, #00b4d8 0%, #22d3ee 100%);
      box-shadow: 0 6px 20px rgba(0,180,216,0.45);
      transform: translateY(-1px);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .error-msg {
      background: rgba(231,76,60,0.12);
      border: 1px solid rgba(231,76,60,0.4);
      color: #ff8a80;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }
    .footer-note {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">
        <img src="assets/images/login-icon.png" alt="MRI" onerror="this.parentElement.innerHTML='<div class=\'logo-icon-fallback\'>🏥</div>'">
      </div>
      <h1>MRI業務マニュアル</h1>
    </div>
    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label for="username">ID</label>
        <input type="text" id="username" name="username" placeholder="IDを入力" autocomplete="username" inputmode="url" required>
      </div>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" name="password" placeholder="パスワードを入力" autocomplete="current-password" inputmode="url" required>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">ログイン</button>
      <div class="error-msg" id="errorMsg">IDまたはパスワードが正しくありません</div>
    </form>
    <p class="footer-note">個人が作成したまとめサイトです。当サイトに個人情報は一切含まれておらず、<br>いかなる組織・施設とも一切関係ありません。</p>
  </div>

  <script>
    // ============================================================
    // 認証設定（管理者がここを編集してアカウントを管理）
    // パスワードはSHA-256ハッシュで保存
    // 新しいハッシュの生成: https://emn178.github.io/online-tools/sha256.html
    // ============================================================
    const AUTH_USERS = {
      // ユーザーID: SHA-256ハッシュ(パスワード)
      // 管理者 ID: kanri / PW: mruser
      'kanri': '79531dad96c99283696e6c9f973f0eae6c52260471b234101b93e65897d7bd64',
      // 一般職員 ID: yao80 / PW: mruser
      'yao80': '79531dad96c99283696e6c9f973f0eae6c52260471b234101b93e65897d7bd64',
    };
    // セッション有効期間（時間）
    const SESSION_HOURS = 12;
    // ============================================================

    // 既にログイン済みならメインページへ
    const session = sessionStorage.getItem('mri_session');
    if (session) {
      try {
        const s = JSON.parse(session);
        if (s.expires > Date.now()) {
          window.location.replace('index.html');
        } else {
          sessionStorage.removeItem('mri_session');
        }
      } catch(e) { sessionStorage.removeItem('mri_session'); }
    }

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // 半角英数字のみに制限（入力中にリアルタイムでフィルタ）
    function enforceHalfWidth(e) {
      const pos = e.target.selectionStart;
      const filtered = e.target.value.replace(/[^a-zA-Z0-9]/g, '');
      if (e.target.value !== filtered) {
        e.target.value = filtered;
        e.target.setSelectionRange(pos - 1, pos - 1);
      }
    }
    document.getElementById('username').addEventListener('input', enforceHalfWidth);
    document.getElementById('password').addEventListener('input', enforceHalfWidth);

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errMsg = document.getElementById('errorMsg');
      btn.disabled = true;
      btn.textContent = '確認中...';
      errMsg.style.display = 'none';

      const username = document.getElementById('username').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      const hash = await sha256(password);
      const expected = AUTH_USERS[username];

      if (expected && hash === expected) {
        // ログイン成功
        sessionStorage.setItem('mri_session', JSON.stringify({
          user: username,
          expires: Date.now() + SESSION_HOURS * 60 * 60 * 1000
        }));
        window.location.replace('index.html');
      } else {
        errMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'ログイン';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });
  </script>
</body>
</html>
